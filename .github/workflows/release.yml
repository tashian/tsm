name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write       # gh release create
  id-token: write       # OIDC for npm Trusted Publishing + sigstore provenance
  attestations: write   # actions/attest-build-provenance

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      # npm Trusted Publishing OIDC requires npm >= 11.5.1.
      # Node 22 LTS ships npm 10.x, which silently falls back to anonymous
      # publishing — that fails as 404 against scoped packages.
      - name: Upgrade npm for Trusted Publishing OIDC
        run: npm install -g npm@latest

      - uses: extractions/setup-just@v4

      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build & package binaries
        run: just package ${{ steps.ver.outputs.version }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/bin/tsm
            dist/bin/tsmd
            dist/release/tsm_${{ steps.ver.outputs.version }}_darwin_arm64.tar.gz

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create v${{ steps.ver.outputs.version }} \
            dist/release/tsm_${{ steps.ver.outputs.version }}_darwin_arm64.tar.gz \
            dist/release/checksums.txt \
            --title "v${{ steps.ver.outputs.version }}" \
            --generate-notes

      - name: Stage npm platform package
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          mkdir -p npm/darwin-arm64/bin
          cp dist/bin/tsm dist/bin/tsmd npm/darwin-arm64/bin/
          chmod +x npm/darwin-arm64/bin/tsm npm/darwin-arm64/bin/tsmd
          cp LICENSE npm/darwin-arm64/LICENSE
          cp LICENSE npm/wrapper/LICENSE
          jq --arg v "$VERSION" '.version = $v' \
            npm/darwin-arm64/package.json > npm/darwin-arm64/package.json.tmp
          mv npm/darwin-arm64/package.json.tmp npm/darwin-arm64/package.json
          jq --arg v "$VERSION" \
            '.version = $v | .optionalDependencies["@tashian/tsm-darwin-arm64"] = $v' \
            npm/wrapper/package.json > npm/wrapper/package.json.tmp
          mv npm/wrapper/package.json.tmp npm/wrapper/package.json

      # Publish order matters: platform first so the wrapper's
      # optionalDependencies resolve when the wrapper hits the registry.
      - name: Publish @tashian/tsm-darwin-arm64
        working-directory: npm/darwin-arm64
        run: npm publish --provenance --access public

      - name: Publish @tashian/tsm
        working-directory: npm/wrapper
        run: npm publish --provenance --access public
